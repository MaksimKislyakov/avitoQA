[tool.black]
line-length = 100
target-version = ["py310"]
skip-string-normalization = false

[tool.ruff]
line-length = 100
target-version = "py310"
exclude = [
    ".venv", "venv", ".git", "__pycache__",
    "allure-results", "allure-report", ".pytest_cache"
]

[tool.ruff.lint]
# E,F,W: стандарты PEP8 и ошибки
# I: сортировка импортов (заменяет isort)
# UP: обновления синтаксиса Python
# B: bugbear (поиск потенциальных багов)
# SIM: упрощение кода
select = ["E", "F", "W", "I", "UP", "B", "SIM"]
ignore = ["E501"] # Длина строки контролируется Black
isort = { known-first-party = ["conftest", "tests"] }

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
disallow_incomplete_defs = false
check_untyped_defs = true
ignore_missing_imports = true # Allure, Faker и pytest часто не имеют строгих stubs
files = ["tests", "conftest.py"]